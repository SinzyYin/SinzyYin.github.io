<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
   {% if site.google_analytics %}
   <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
   <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      
      gtag('config', '{{ site.google_analytics }}');
   </script>
   {% endif %}
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   {% seo %}
   <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}"> 
   <!--[if lt IE 9]>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
   <![endif]-->
   <!--deleting stylesheet will result in BROKEN WEBSITE-->

    
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

    <style>
/* Global Styles */
body {
    font-family: 'DM Sans', 'Arial', 'Helvetica Neue', sans-serif !important;
    font-weight: 300 !important;
    font-style: normal !important;
    margin: 30px !important; /* Website margin applied to body */
    padding: 0 !important;
    line-height: 1.5 !important; /* Increased line-height for better readability */
    color: #0A0A0A !important;
    font-size: 1.0rem !important; /* Increased body font size */
    background-color: #e5e3dc !important; /* Website background color */
}

/* Black link styles */
.black-link {
    color: #0A0A0A !important;
    text-decoration: none !important; /* Optional: removes underline */
}

/* Italic Text */
.em {
    font-style: italic !important;
}

/* Bold Text */
.strong {
    font-weight: 500 !important;
}

/* Bold and Italic Text */
.strong.em {
    font-weight: 500 !important;
    font-style: italic !important;
}

/* Headings */
h1, h2, h3, h4, h5, h6 {
    font-family: 'Lora', 'Georgia', 'Times New Roman', serif !important;
    font-weight: 400 !important;
    margin: 0 !important; /* Removed margin for headings */
    padding: 10px 0 !important; /* Added padding to headings for spacing */
    line-height: 1.3 !important; /* Slightly increased line-height for headings */
}

/* Font Sizes for Headings (Desktop Default) */
h1 {
    font-size: 2.35rem !important; /* Larger h1 */
    padding-top: 20px; /* Added padding-top for spacing */
}

h2 {
    font-size: 2rem !important; /* Larger h2 */
    padding-top: 15px; /* Added padding-top for spacing */
}

h3 {
    font-size: 1.75rem !important; /* Larger h3 */
    padding-top: 12px; /* Added padding-top for spacing */
}

h4 {
    font-size: 1.5rem !important; /* Larger h4 */
    padding-top: 10px; /* Added padding-top for spacing */
}

h5 {
    font-size: 1.25rem !important; /* Larger h5 */
    padding-top: 8px; /* Added padding-top for spacing */
}

h6 {
    font-size: 1.0rem !important; /* Larger h6 */
    padding-top: 6px; /* Added padding-top for spacing */
}

/* Bolded Headings */
h1.strong, h2.strong, h3.strong, h4.strong, h5.strong, h6.strong {
    font-weight: 600 !important;
}
    </style>


</head>
<body>
   <div class="wrapper">
      <header>
            <h1><a href="{{ "/" | absolute_url }}" class="black-link">{{ site.title | default: site.github.repository_name }}</a></h1>
            {% if site.logo %}
            <img src="{{site.logo | relative_url}}" alt="Logo" style="border-radius: 50%; width: 250px; height: 250px;" />
            {% endif %}
            <p>{{ site.description | default: site.github.project_tagline }}</p>
            {% endif %}
      </header>
      <section style="padding-bottom: 50px;">
        {{ content }}
      </section>
      <footer>
         <small>
            <p xmlns:cc="http://creativecommons.org/ns#" style="padding: 15px 0;">
                <a rel="cc:attributionURL" href="https://sinzyyin.github.io/" class="black-link">This website</a> 
                by 
                <a rel="cc:attributionURL dct:creator" property="cc:attributionName" href="https://github.com/SinzyYin" class="black-link">SinzyYin</a> 
                is licensed under 
                <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/?ref=chooser-v1" target="_blank" rel="license noopener noreferrer" class="black-link" style="display:inline-block;">
                    CC BY-NC-ND 4.0                
                  <img style="height:14px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/cc.svg?ref=chooser-v1" alt="">
                  <img style="height:14px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/by.svg?ref=chooser-v1" alt="">
                  <img style="height:14px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/nc.svg?ref=chooser-v1" alt="">
                  <img style="height:14px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/nd.svg?ref=chooser-v1" alt="">
               </a>
            </p>             
         </small>
      </footer>
   </div>
   <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
</body>
</html>
