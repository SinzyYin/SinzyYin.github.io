<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
   {% if site.google_analytics %}
   <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
   <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      
      gtag('config', '{{ site.google_analytics }}');
   </script>
   {% endif %}
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   {% seo %}
   <link rel="stylesheet" href="/assets/css/style.css">
   <!--[if lt IE 9]>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
   <![endif]-->
   <!--deleting stylesheet will result in BROKEN WEBSITE-->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

   <style>
           /* Navigation container - Compact */
           .nav-container {
            display: flex;
            align-items: center;
            gap: 15px; /* Reduce spacing between items */
            font-size: 0.85rem; /* Smaller font */
            font-family: "Lora", serif;
            padding: 5px 0; /* Reduce padding */
        }

        /* Dropdown container */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* Dropdown menu - Slow fade-in animation */
        .dropdown-content {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 110%; /* Move dropdown lower to avoid touching About Me */
            left: 0;
            background: transparent;
            gap: 6px; /* Reduce spacing between dropdown items */
            font-size: 0.8rem;
            min-width: 160px;
            padding-top: 5px;
            opacity: 0;
            transform: translateY(-10px); /* Initially move up slightly */
            pointer-events: none; /* Prevent interaction before it appears */
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* Ensure dropdown stays open when hovering */
        .dropdown:hover .dropdown-content {
            opacity: 1;
            transform: translateY(0); /* Moves to normal position smoothly */
            pointer-events: auto;
        }

        /* Remove underline for dropdown items */
        .dropdown-content a::after {
            display: none !important;
        }

        /* Add a light hover background for dropdown items */
        .dropdown-content a:hover {
            background: rgba(64, 63, 26, 0.1);
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="nav-container">
        <a href="index.html">About Me</a>
        <a href="learningmilestones.html">Learning Milestones</a>
    
        <div class="dropdown">
            <a href="#">My Portfolios</a>
            <div class="dropdown-content">
                <a href="#">Content Creation</a>
                <a href="photography.html">Photography</a>
                <a href="#">Data Analysis & Visualization</a>
                <a href="#">How I’d Do It Blog</a>
            </div>
        </div>
        <div class="nav-container">
            <a href="contact.html">Contact Me</a>
        </div>
    </div>


    <div class="contact-container">
        <h2>Contact Me</h2>
        <p>Feel free to reach out via the form below.</p>
        
        <form action="/submit-form" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required></textarea>
            
            <button type="submit">Send Message</button>
        </form>
    </div>
</body>
</html>
