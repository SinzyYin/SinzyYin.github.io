   <style>
        /* Navigation container - Compact */
        .nav-container {
        display: flex;
        align-items: center;
        gap: 15px; /* Reduce spacing between items */
        font-size: 0.85rem; /* Smaller font */
        font-family: "Lora", serif;
        padding: 5px 0; /* Reduce padding */
        }

        /* Dropdown container */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* Dropdown menu - Slow fade-in animation */
        .dropdown-content {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 110%; /* Move dropdown lower to avoid touching About Me */
            left: 0;
            background: transparent;
            gap: 6px; /* Reduce spacing between dropdown items */
            font-size: 0.8rem;
            min-width: 160px;
            padding-top: 5px;
            opacity: 0;
            transform: translateY(-10px); /* Initially move up slightly */
            pointer-events: none; /* Prevent interaction before it appears */
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* Ensure dropdown stays open when hovering */
        .dropdown:hover .dropdown-content {
            opacity: 1;
            transform: translateY(0); /* Moves to normal position smoothly */
            pointer-events: auto;
        }

        /* Remove underline for dropdown items */
        .dropdown-content a::after {
            display: none !important;
        }

        /* Add a light hover background for dropdown items */
        .dropdown-content a:hover {
            background: rgba(64, 63, 26, 0.1);
            border-radius: 4px;
        }

        .contact-container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }
        button {
            background-color: #403f1a;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2e2d14;
        }
        .social-link {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            font-size: 0.95rem;
        }
        .social-link img {
            height: 16px;
        }
        .social-link a {
            color: #403f1a;
            text-decoration: none;
        }

    </style>
</head>

<body>
