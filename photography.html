<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
<head>
   {% if site.google_analytics %}

      window.dataLayer = window.dataLayer || [];

      gtag('config', '{{ site.google_analytics }}');
   </script>

   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   {% seo %}
   <link rel="stylesheet" href="/assets/css/style.css">
   <!--[if lt IE 9]>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
   <![endif]-->
   <!--deleting stylesheet will result in BROKEN WEBSITE-->
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

   <style>
        /* About Me Container - Modern Card Style */
        .about-me {
            background-color: #fdfdfd;
            color: #403f1a;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 4px 4px 14px rgba(0, 0, 0, 0.1);
            text-align: left;
            max-width: 480px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            transition: box-shadow 0.3s ease-in-out;
        }

        /* Hover effect for depth */
        .about-me:hover {
            box-shadow: 6px 6px 20px rgba(0, 0, 0, 0.15);
        }

        /* Heading Styling with Gradient Text */
        .about-me h5 {
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            font-weight: 600;
            position: relative;
            padding-bottom: 8px;
            text-align: left;

            /* Gradient Text */
            background-image: linear-gradient(-20deg, #616161 0%, #9bc5c3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* Fallback Color */
            color: #616161;
        }

        /* Underline Animation */
        .about-me h5::after {
            content: "";
            display: block;
            width: 50px;
            height: 2px;
            background-color: #9bc5c3; /* Light teal from the gradient */
            margin-top: 4px;
            transition: width 0.3s ease-in-out;
        }

        .about-me h5:hover::after {
            width: 80px;
        }

        /* Paragraph Styling */
        .about-me p {
            font-size: 0.9rem;
            line-height: 1.6;
            font-weight: 400;
            padding: 10px 0;
        }

        /* Highlight styles */
        .highlight {
            font-weight: 600;
            color: #9bc5c3; /* Light teal */
        }

        /* Background Highlight */
        .highlight-bg {
            font-weight: 500;
            color: #616161;
            background: rgba(155, 197, 195, 0.3); /* Soft teal background */
            padding: 3px 6px;
            border-radius: 4px;
        }

        /* CTA Button */
        .about-me .cta-button {
            margin-top: 15px;
            padding: 8px 14px;
            background-color: #616161; /* Dark gray from the gradient */
            color: #ffffff;
            font-size: 0.85rem;
            border-radius: 6px;
            text-decoration: none;
            transition: background 0.3s, color 0.3s;
        }

        .about-me .cta-button:hover {
            background-color: #9bc5c3; /* Light teal */
            color: #ffffff;
        }

            /* Navigation container - Compact */
        .nav-container {
            display: flex;
            align-items: center;
            gap: 15px; /* Reduce spacing between items */
            font-size: 0.85rem; /* Smaller font */
            font-family: "Lora", serif;
            padding: 5px 0; /* Reduce padding */
        }

        /* Dropdown container */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* Dropdown menu - Slow fade-in animation */
        .dropdown-content {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 110%; /* Move dropdown lower to avoid touching About Me */
            left: 0;
            background: transparent;
            gap: 6px; /* Reduce spacing between dropdown items */
            font-size: 0.8rem;
            min-width: 160px;
            padding-top: 5px;
            opacity: 0;
            transform: translateY(-10px); /* Initially move up slightly */
            pointer-events: none; /* Prevent interaction before it appears */
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* Ensure dropdown stays open when hovering */
        .dropdown:hover .dropdown-content {
            opacity: 1;
            transform: translateY(0); /* Moves to normal position smoothly */
            pointer-events: auto;
        }

        /* Remove underline for dropdown items */
        .dropdown-content a::after {
            display: none !important;
        }

        /* Add a light hover background for dropdown items */
        .dropdown-content a:hover {
            background: rgba(64, 63, 26, 0.1);
            border-radius: 4px;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f8f8;
        }
        .nav-container-types-photography {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.85rem;
            font-family: "Lora", serif;
            padding: 5px 0;
        }

        .filter-container {
            display: flex;
            gap: 12px;
            margin: 20px;
        }

        .filter-button {
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid #616161;
            background: transparent;
            color: #616161;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }
        .filter-button:hover, .filter-button.active {
            background: #616161;
            color: white;
            border-color: #616161;
            transform: translateY(-2px);
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }
        .gallery-container {
            max-width: 1000px;
            padding: 20px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 8px;
        }
        .lightbox:target {
            visibility: visible;
            opacity: 1;
        }
        .lightbox .close {
        position: absolute;
        top: 20px;
        right: 30px;
        font-size: 30px;
        color: #fff;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.7); /* Brighter background */
        padding: 5px 10px;
        border-radius: 50%;
        transition: background 0.3s ease;
         }   
        .lightbox .close:hover {
        background: rgba(255, 255, 255, 1); /* Fully bright on hover */
        color: #000; /* Black 'X' for contrast */

          }
        .hidden {
            display: none;
        }

    </style>
</head>
<body>
    <div class="nav-container-types-photography">
        <a href="index.html">About Me</a>
        <a href="learningmilestones.html">Learning Milestones</a>
        <a href="photography.html">Photography</a>
        <a href="contact.html">Contact Me</a>
    </div>
    
    <div class="filter-container">
        <button class="filter-button active" data-filter="all">All</button>
        <button class="filter-button" data-filter="nature">Nature</button>
        <button class="filter-button" data-filter="portrait">Portrait</button>
        <button class="filter-button" data-filter="urban">Urban</button>
    </div>

    <div class="gallery-container">
        <div class="gallery">
            <a href="#PhotographyAssignment_A_1"><img src="images/photography/PhotographyAssignment_A_1.jpg" alt="Portrait Photo" class="photo portrait"></a>
            <a href="#PhotographyAssignment_A_2"><img src="images/photography/PhotographyAssignment_A_2.jpg" alt="Urban Photo" class="photo urban"></a>
            <a href="#PhotographyAssignment_A_3"><img src="images/photography/PhotographyAssignment_A_3.jpg" alt="Urban Photo" class="photo urban"></a>
            <a href="#PhotographyAssignment_A_4"><img src="images/photography/PhotographyAssignment_A_4.jpg" alt="Urban Photo" class="photo urban"></a>
            <a href="#PhotographyAssignment_A_5"><img src="images/photography/PhotographyAssignment_A_5.jpg" alt="Portrait Photo" class="photo portrait"></a>
        </div>
    </div>

    <div class="lightbox" id="PhotographyAssignment_A_1">
        <a href="#" class="close">&times;</a>
        <img src="images/photography/PhotographyAssignment_A_1.jpg" alt="Portrait Photo">
    </div>
    <div class="lightbox" id="PhotographyAssignment_A_2">
        <a href="#" class="close">&times;</a>
        <img src="images/photography/PhotographyAssignment_A_2.jpg" alt="Urban Photo">
    </div>
    <div class="lightbox" id="PhotographyAssignment_A_3">
        <a href="#" class="close">&times;</a>
        <img src="images/photography/PhotographyAssignment_A_3.jpg" alt="Urban Photo">
    </div>
    <div class="lightbox" id="PhotographyAssignment_A_4">
        <a href="#" class="close">&times;</a>
        <img src="images/photography/PhotographyAssignment_A_4.jpg" alt="Urban Photo">
    </div>
    <div class="lightbox" id="PhotographyAssignment_A_5">
        <a href="#" class="close">&times;</a>
        <img src="images/photography/PhotographyAssignment_A_5.jpg" alt="Portrait Photo">
    </div>

    <script>
        document.querySelectorAll('.filter-button').forEach(button => {
            button.addEventListener('click', function() {
                document.querySelectorAll('.filter-button').forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
                let filterValue = this.getAttribute('data-filter');
                let photos = document.querySelectorAll('.gallery img');
                photos.forEach(photo => {
                    if (filterValue === 'all' || photo.classList.contains(filterValue)) {
                        photo.parentElement.style.display = 'block';
                    } else {
                        photo.parentElement.style.display = 'none';
                    }
                });
            });
        });
    </script>
</body>
</html>
